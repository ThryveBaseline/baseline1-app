<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thryve Content Approval Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0e14;
    --surface: #141820;
    --raised: #1c2230;
    --border: rgba(255,255,255,0.08);
    --text: #e8eaf0;
    --muted: #6b7280;
    --amber: #e8a430;
    --amber-dim: rgba(232,164,48,0.15);
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.12);
    --radius: 8px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; }

  /* ── Layout ── */
  .app { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 56px 1fr; height: 100vh; }

  /* ── Header ── */
  .header {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 16px;
    padding: 0 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .header-logo { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--amber); }
  .header-title { font-size: 13px; color: var(--muted); }
  .header-sep { width: 1px; height: 20px; background: var(--border); }
  .progress-bar-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
  .progress-bar-track { flex: 1; max-width: 200px; height: 4px; background: var(--raised); border-radius: 2px; }
  .progress-bar-fill { height: 100%; background: var(--amber); border-radius: 2px; transition: width 0.4s; }
  .progress-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
  }
  .sidebar-section-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 0 16px 8px; }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .sidebar-item:hover { background: var(--raised); }
  .sidebar-item.active { background: var(--amber-dim); border-left-color: var(--amber); }
  .sidebar-item-name { flex: 1; font-size: 13px; font-weight: 500; }
  .sidebar-item-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.pending { background: var(--muted); }
  .status-dot.approved { background: var(--green); }
  .status-dot.pushed { background: var(--amber); }
  .status-dot.rejected { background: var(--red); }

  /* ── Main panel ── */
  .main { display: flex; flex-direction: column; overflow: hidden; }

  .product-header {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .product-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 600; flex: 1; }
  .product-id { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }

  .tab-bar {
    display: flex; gap: 0;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .tab {
    padding: 10px 16px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: 'DM Sans', sans-serif;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--amber); }
  .tab:hover:not(.active) { color: var(--text); }

  .panel-body { flex: 1; overflow: hidden; position: relative; }

  /* ── Preview tab ── */
  #tab-preview { position: absolute; inset: 0; display: flex; flex-direction: column; }
  #tab-edit { position: absolute; inset: 0; display: flex; flex-direction: column; display: none; }

  .preview-frame-wrap { flex: 1; overflow: hidden; padding: 0; }
  .preview-frame {
    width: 100%; height: 100%;
    border: none;
    background: #fff;
  }

  /* ── Edit tab ── */
  .edit-toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--raised);
    flex-shrink: 0;
  }
  .edit-hint { font-size: 12px; color: var(--muted); flex: 1; }
  .edit-textarea {
    flex: 1;
    resize: none;
    background: var(--bg);
    color: var(--text);
    border: none;
    padding: 20px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    outline: none;
    overflow-y: auto;
  }

  /* ── Actions bar ── */
  .actions-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .actions-status { flex: 1; font-size: 12px; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px; font-family: 'DM Mono', monospace;
  }
  .status-badge.pending { background: rgba(107,114,128,0.15); color: var(--muted); }
  .status-badge.approved { background: var(--green-dim); color: var(--green); }
  .status-badge.pushed { background: var(--amber-dim); color: var(--amber); }
  .status-badge.rejected { background: var(--red-dim); color: var(--red); }
  .status-badge.pushing { background: var(--blue-dim); color: var(--blue); }

  .btn {
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: opacity 0.15s;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--amber); color: #0b0e14; }
  .btn-primary:hover:not(:disabled) { opacity: 0.85; }
  .btn-secondary { background: var(--raised); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover:not(:disabled) { background: var(--surface); }
  .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
  .btn-danger:hover:not(:disabled) { opacity: 0.8; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* ── Empty state ── */
  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--muted); gap: 8px;
  }
  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 13px; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 13px;
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    transform: translateY(80px);
    opacity: 0;
    transition: transform 0.25s, opacity 0.25s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(74,222,128,0.3); color: var(--green); }
  .toast.error { border-color: rgba(248,113,113,0.3); color: var(--red); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--raised); border-radius: 3px; }

  .char-count { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="header-logo">Thryve</div>
    <div class="header-sep"></div>
    <div class="header-title">Content Approval Dashboard</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">0 / 6 approved</div>
    </div>
  </header>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-section-label">Products</div>
    <div id="sidebarList"></div>
  </nav>

  <!-- Main panel -->
  <main class="main" id="mainPanel">
    <div class="empty-state" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      <p>Select a product to review</p>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────

const state = {
  products: {},
  statuses: {}, // pending | approved | pushed | rejected
  edits: {},    // stores edited HTML per product key
  current: null,
  activeTab: 'preview',
};

// ── Fetch product data ─────────────────────────────────────────────────────

async function loadProducts() {
  try {
    const res = await fetch('/admin/product-content.json');
    if (!res.ok) throw new Error('Failed to load product data');
    state.products = await res.json();
    Object.keys(state.products).forEach(k => {
      state.statuses[k] = 'pending';
      state.edits[k] = state.products[k].html;
    });
    renderSidebar();
  } catch (err) {
    showToast('Could not load product data: ' + err.message, 'error');
  }
}

// ── Sidebar ────────────────────────────────────────────────────────────────

function renderSidebar() {
  const list = document.getElementById('sidebarList');
  list.innerHTML = Object.keys(state.products).map(key => {
    const p = state.products[key];
    const status = state.statuses[key];
    const short = p.title.replace('Hydra Max', 'Hydra Max').replace('Build Your System', 'Build System').replace('Thryve', '').trim().replace(/\s+/g,' ');
    return `<div class="sidebar-item ${state.current === key ? 'active' : ''}" onclick="selectProduct('${key}')">
      <div class="status-dot ${status}"></div>
      <div>
        <div class="sidebar-item-name">${escHtml(short)}</div>
        <div class="sidebar-item-sub">${statusLabel(status)}</div>
      </div>
    </div>`;
  }).join('');
}

function statusLabel(s) {
  return { pending: 'Pending review', approved: 'Approved', pushed: 'Pushed live', rejected: 'Skipped' }[s] || s;
}

function updateProgress() {
  const total = Object.keys(state.products).length;
  const done = Object.values(state.statuses).filter(s => s === 'pushed' || s === 'approved').length;
  document.getElementById('progressFill').style.width = total ? (done / total * 100) + '%' : '0%';
  document.getElementById('progressLabel').textContent = `${done} / ${total} approved`;
}

// ── Product panel ──────────────────────────────────────────────────────────

function selectProduct(key) {
  state.current = key;
  state.activeTab = 'preview';
  renderSidebar();
  renderMain();
}

function renderMain() {
  const key = state.current;
  if (!key || !state.products[key]) {
    document.getElementById('mainPanel').innerHTML = `<div class="empty-state" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      <p>Select a product to review</p></div>`;
    return;
  }

  const p = state.products[key];
  const status = state.statuses[key];
  const html = state.edits[key];
  const isPushed = status === 'pushed';

  document.getElementById('mainPanel').innerHTML = `
    <div class="product-header">
      <div>
        <div class="product-title">${escHtml(p.title)}</div>
        <div class="product-id">${p.id}</div>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab ${state.activeTab === 'preview' ? 'active' : ''}" onclick="switchTab('preview')">Preview</button>
      <button class="tab ${state.activeTab === 'edit' ? 'active' : ''}" onclick="switchTab('edit')">Edit HTML</button>
    </div>

    <div class="panel-body">
      <div id="tab-preview" style="position:absolute;inset:0;display:${state.activeTab === 'preview' ? 'flex' : 'none'};flex-direction:column;">
        <div class="preview-frame-wrap" style="flex:1;overflow:hidden;">
          <iframe class="preview-frame" id="previewFrame" sandbox="allow-same-origin"></iframe>
        </div>
      </div>

      <div id="tab-edit" style="position:absolute;inset:0;display:${state.activeTab === 'edit' ? 'flex' : 'none'};flex-direction:column;">
        <div class="edit-toolbar">
          <span class="edit-hint">Edit HTML directly. Changes are saved locally until you push.</span>
          <span class="char-count" id="charCount">${html.length.toLocaleString()} chars</span>
          <button class="btn btn-secondary btn-sm" onclick="resetEdit('${key}')">Reset to original</button>
          <button class="btn btn-secondary btn-sm" onclick="updatePreview()">Preview changes</button>
        </div>
        <textarea class="edit-textarea" id="editTextarea" oninput="onEdit('${key}', this.value)">${escTextarea(html)}</textarea>
      </div>
    </div>

    <div class="actions-bar">
      <div class="actions-status">
        <span class="status-badge ${status}" id="statusBadge">${statusLabel(status)}</span>
      </div>
      ${isPushed
        ? `<button class="btn btn-secondary" onclick="repush('${key}')">Re-push</button>`
        : `<button class="btn btn-danger btn-sm" onclick="skipProduct('${key}')">Skip</button>
           <button class="btn btn-primary" onclick="approveAndPush('${key}')" id="pushBtn">Approve &amp; Push to Shopify</button>`
      }
    </div>`;

  // Populate iframe
  if (state.activeTab === 'preview') populateFrame(html);
}

function populateFrame(html) {
  const frame = document.getElementById('previewFrame');
  if (!frame) return;
  const doc = frame.contentDocument || frame.contentWindow?.document;
  if (!doc) return;
  doc.open();
  doc.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"></head><body style="margin:0;padding:0;">${html}</body></html>`);
  doc.close();
}

function switchTab(tab) {
  state.activeTab = tab;
  const pTab = document.getElementById('tab-preview');
  const eTab = document.getElementById('tab-edit');
  const tabs = document.querySelectorAll('.tab');
  if (pTab) pTab.style.display = tab === 'preview' ? 'flex' : 'none';
  if (eTab) eTab.style.display = tab === 'edit' ? 'flex' : 'none';
  tabs.forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().startsWith(tab)));
  if (tab === 'preview') populateFrame(state.edits[state.current]);
}

function onEdit(key, value) {
  state.edits[key] = value;
  const cc = document.getElementById('charCount');
  if (cc) cc.textContent = value.length.toLocaleString() + ' chars';
}

function resetEdit(key) {
  state.edits[key] = state.products[key].html;
  const ta = document.getElementById('editTextarea');
  if (ta) ta.value = escTextarea(state.products[key].html);
  const cc = document.getElementById('charCount');
  if (cc) cc.textContent = state.products[key].html.length.toLocaleString() + ' chars';
  showToast('Reset to original');
}

function updatePreview() {
  if (state.activeTab === 'preview') return;
  switchTab('preview');
}

// ── Push to Shopify ────────────────────────────────────────────────────────

async function approveAndPush(key) {
  const p = state.products[key];
  const html = state.edits[key];
  const btn = document.getElementById('pushBtn');
  const badge = document.getElementById('statusBadge');

  if (btn) btn.disabled = true;
  if (badge) { badge.className = 'status-badge pushing'; badge.textContent = 'Pushing...'; }

  try {
    const res = await fetch('/api/shopify-update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ productId: p.id, body: html }),
    });
    const data = await res.json();

    if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);

    state.statuses[key] = 'pushed';
    renderSidebar();
    updateProgress();
    renderMain();
    showToast(`${p.title.split(' ')[0]} pushed live`, 'success');
  } catch (err) {
    if (badge) { badge.className = 'status-badge pending'; badge.textContent = 'Push failed'; }
    if (btn) btn.disabled = false;
    showToast('Push failed: ' + err.message, 'error');
  }
}

async function repush(key) {
  const p = state.products[key];
  const html = state.edits[key];
  try {
    const res = await fetch('/api/shopify-update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ productId: p.id, body: html }),
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
    showToast(`Re-pushed ${p.title.split(' ')[0]}`, 'success');
  } catch (err) {
    showToast('Re-push failed: ' + err.message, 'error');
  }
}

function skipProduct(key) {
  state.statuses[key] = 'rejected';
  renderSidebar();
  updateProgress();
  const badge = document.getElementById('statusBadge');
  if (badge) { badge.className = 'status-badge rejected'; badge.textContent = 'Skipped'; }
  renderMain();
}

// ── Utilities ──────────────────────────────────────────────────────────────

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escTextarea(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let _toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.classList.remove('show'); }, 3500);
}

// ── Init ───────────────────────────────────────────────────────────────────

loadProducts();
</script>
</body>
</html>
