[build]
  publish = "."
  functions = "netlify/functions"
 
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
 
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Cache-Control = "public, max-age=0, must-revalidate"
 
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
 
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
 
